                      - list [ref=e1500]:
                        - listitem [ref=e1501]: "예: Notification Hub에서 080 수신거부 번호를 신청하면, SMS 서비스와 공유되며 Notification 통합 - 080 수신거부 요금으로 부과됩니다."
                    - listitem [ref=e1502]: Notification 통합 - 웹훅은 Notification Hub, SMS, Email, KakaoTalk Bizmessage 서비스의 웹훅 발송 건수를 합산하여 과금됩니다.
                  - heading "안내" [level=4] [ref=e1503]
                  - list [ref=e1507]:
                    - listitem [ref=e1508]: SMS는 메시지 길이가 90바이트 이하인 단문 메시지이며, LMS는 메시지 길이가 2,000바이트 이하인 장문 메시지입니다. MMS는 멀티미디어 파일(사진, 컬러티콘, 배경 음악)이 첨부된 메시지입니다.
                    - listitem [ref=e1509]:
                      - text: "080 수신 거부 서비스는 월정액 서비스로, 이용 요금에 서비스 이용료, 기본 회선료, 통화료가 포함됩니다. (예: 3일을 사용해도 1개월 요금"
                      - emphasis [ref=e1510]: 30,000원
                      - text: 이 부과됩니다.)
                    - listitem [ref=e1511]: SMS 서비스의 웹훅 기능은 수신 거부 및 발송 결과에 대해 제공합니다.
                  - paragraph [ref=e1512]
