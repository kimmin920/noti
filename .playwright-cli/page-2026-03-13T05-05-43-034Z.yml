                    - listitem [ref=e1321]:
                      - paragraph [ref=e1322]: Notification 통합 - 080 수신거부는 Notification Hub, SMS 서비스의 080 수신거부 이용을 통합하여 과금됩니다.
                      - list [ref=e1323]:
                        - listitem [ref=e1324]:
                          - paragraph [ref=e1325]: "예: Notification Hub에서 080 수신거부 번호를 신청하면 SMS 서비스와 공유되며, Notification 통합 - 080 수신거부 요금으로 부과됩니다."
                    - listitem [ref=e1326]:
                      - paragraph [ref=e1327]: Notification 통합 - 080 수신거부는 월정액 서비스로 이용 요금에 서비스 이용료, 기본 회선료, 통화료가 포함됩니다.
