                  - heading "알림" [level=4] [ref=e637]
                  - list [ref=e641]:
                    - listitem [ref=e642]: 인스턴스에서 발생하는 네트워크 전송량은 인스턴스의 하이퍼바이저 관리 툴에서 측정한 네트워크 전송량(outbound)의 총합을 기준으로 합니다.
                    - listitem [ref=e643]: 이용자 서버에서 발생하는 총 네트워크 전송량의 5% 이상 또는 20MB 이상의 국제 네트워크 전송량이 발생하면, 별도의 이용 요금을 협의하거나 국제 네트워크 전송을 제한할 수 있습니다.
                    - listitem [ref=e644]: NHN Cloud는 이용자의 네트워크 제한 시 사전에 이를 이용자에게 통보하며, 이용자가 연락처를 적지 않았거나 잘못 적어서 통보를 받지 못했을 때 발생한 피해는 보상하지 않습니다.
                    - listitem [ref=e645]:
                      - text: NHN Cloud 서비스 간 트래픽 이용 요금은 아래 내용을 참고하시기 바랍니다.
                      - list [ref=e646]:
                        - listitem [ref=e647]: "적용 서비스: Backup, Object Storage, API Gateway, Vaccine, Log & Crash Search, Service Monitoring, NHN Container Registry(NCR)"
