                    - listitem [ref=e612]: 인스턴스 요금은 스토리지 비용을 포함하지 않은 것으로, 블록 스토리지 요금 정책에 따라 비용이 청구됩니다.
                  - heading "안내" [level=4] [ref=e613]
                  - generic [ref=e616]:
                    - paragraph
                    - strong [ref=e618]: 인스턴스 중지 시 요금 안내
                    - list [ref=e619]:
                      - listitem [ref=e620]: 인스턴스가 중지되면 90일간 홈페이지 요금 기준으로 90% 할인된 금액을 적용합니다. 중지 상태가 90일을 초과하면 중지 상태를 유지하면서 정상 요금으로 전환됩니다.
                      - listitem [ref=e621]: 90일 중지 기간은 인스턴스 단위로 적용됩니다.
                      - listitem [ref=e622]: 플로팅 IP, 로드밸런서, 블록 스토리지, Windows 라이선스 등 서버에 연결된 다른 리소스 요금은 인스턴스 중지 시에도 정상적으로(100%) 청구됩니다.
                      - listitem [ref=e623]: 불필요한 요금이 청구되지 않도록 사용하지 않는 리소스는 꼭 삭제해 주시기 바랍니다.
