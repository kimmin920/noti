                    - listitem [ref=e1088]: Virtual Desktop에 추가 구성이 필요한 인프라 서비스(방화벽, VPN, 보안 서비스 등)는 NHN Cloud 또는 마켓플레이스 서비스를 이용할 수 있습니다. (별도 문의)
                    - listitem [ref=e1089]: 오피스 프로그램(Microsoft 365 , 한컴오피스, Polaris Office 등), 협업 도구, 망 연계, 백신, PMS, 내PC지키미, 유해 차단, 화면 보호 등 부가적인 서비스는 협의하여 이용할 수 있습니다. (별도 문의)
                    - listitem [ref=e1090]: 최소 약정 기간 1년을 권장합니다.
                    - listitem [ref=e1091]: 약정 기간, 사용 수량에 따라 추가적인 할인 정책을 운영하고 있습니다. (별도 문의)
              - generic [ref=e1092]:
                - strong [ref=e1093]: Disk
                - generic [ref=e1094]:
                  - heading "알림" [level=4] [ref=e1095]
                  - list [ref=e1096]:
                    - listitem [ref=e1097]: OS Disk는 사용자 게스트 OS 영역(C:)에 사용하는 저장소입니다.
                    - listitem [ref=e1098]: Personal Disk는 개인 데이터 저장(D:)에 사용하는 저장소이며, VD별로 할당되므로 Dedicate VD 전용입니다.
                    - listitem [ref=e1099]: Shared Disk는 개인 데이터 저장(D:)에 사용하는 저장소이며, 유저별로 할당되므로 Shared VD에 주로 사용됩니다.
                    - listitem [ref=e1100]: OS Disk는 시스템 영역이므로 확장은 가능하지만 축소는 불가능합니다.
                    - listitem [ref=e1101]: Disk는 고성능 SSD로 제공합니다.
              - generic [ref=e1102]:
                - strong [ref=e1103]: Managed
                - generic [ref=e1104]:
                  - heading "알림" [level=4] [ref=e1105]
                  - list [ref=e1106]:
                    - listitem [ref=e1107]: 설치/운영/관리 서비스, 사용자 정책 설정, 마스터 이미지 관리, 컨설팅, 기술 지원 등을 제공합니다.
                    - listitem [ref=e1108]: Virtual Desktop 요금과 별개로 할인 및 수수료 정책이 적용되지 않습니다.
                    - listitem [ref=e1109]:
