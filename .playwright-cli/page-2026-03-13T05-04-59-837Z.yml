                        - listitem [ref=e649]: API Gateway 서비스는 모든 리전에서 발생한 네트워크 트래픽이 무료입니다.
                        - listitem [ref=e650]: 글로벌 서비스는 모든 리전에서 발생한 네트워크 트래픽이 무료입니다.
