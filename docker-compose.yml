services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: publ_messaging
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/publ_messaging?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/publ_messaging?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  poller:
    build:
      context: .
      dockerfile: docker/poller.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/publ_messaging?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    env_file:
      - .env
    environment:
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - api

volumes:
  pg_data:
