# Demo-friendly Render blueprint for the full messaging stack.
# Background processing requires a paid worker on Render, so worker and poller
# are combined into one Starter service to keep the footprint smaller.

previews:
  generation: none

envVarGroups:
  - name: publ-shared-config
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: publ-messaging
      - key: COOKIE_NAME
        value: pm_session
      - key: COOKIE_MAX_AGE_SECONDS
        value: 86400
      - key: BULLMQ_QUEUE_NAME
        value: publ_messaging_queue
      - key: NHN_OAUTH_BASE_URL
        value: https://oauth.api.nhncloudservice.com
      - key: NHN_NOTIFICATION_HUB_BASE_URL
        value: https://notification-hub.api.nhncloudservice.com
      - key: NHN_SMS_BASE_URL
        value: https://api-sms.cloud.toast.com
      - key: NHN_ALIMTALK_BASE_URL
        value: https://api-alimtalk.cloud.toast.com
      - key: NHN_RATE_LIMIT_RPS
        value: 300
      - key: RESULT_POLLER_INTERVAL_SECONDS
        value: 120
      - key: RESULT_EARLY_CHECK_DELAYS_SECONDS
        value: 10,30
      - key: FEATURE_ENABLE_ALIMTALK
        value: true
      - key: FEATURE_ENABLE_ALIMTALK_FALLBACK_SMS
        value: true
      - key: FEATURE_ENABLE_SMS
        value: true
      - key: MESSAGE_PURPOSE
        value: NORMAL
  - name: publ-secrets
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBL_SSO_HS256_SECRET
        sync: false
      - key: PUBL_SERVICE_TOKEN
        sync: false
      - key: NHN_USER_ACCESS_KEY_ID
        sync: false
      - key: NHN_SECRET_ACCESS_KEY
        sync: false
      - key: NHN_NOTIFICATION_HUB_APP_KEY
        sync: false
      - key: NHN_SMS_APP_KEY
        sync: false
      - key: NHN_SMS_SECRET_KEY
        sync: false
      - key: NHN_ALIMTALK_APP_KEY
        sync: false
      - key: NHN_ALIMTALK_SECRET_KEY
        sync: false
      - key: NHN_DEFAULT_SENDER_GROUP_KEY
        sync: false
      - key: NHN_WEBHOOK_SIGNATURE_SECRET
        sync: false

services:
  - type: web
    name: publ-notification-api
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run prisma:generate && npm run build -w @publ/shared && npm run build -w @publ/database && npm run build -w @publ/api
    startCommand: npm run prisma:migrate -w @publ/database && npm run start -w @publ/api
    healthCheckPath: /health
    envVars:
      - fromGroup: publ-shared-config
      - fromGroup: publ-secrets
      - key: PORT
        value: 10000
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAMESITE
        value: none
      - key: DATABASE_URL
        fromDatabase:
          name: publ-postgres
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: publ-redis
          property: connectionString
      - key: ADMIN_BASE_URL
        fromService:
          name: publ-notification-admin
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ALLOW_ORIGINS
        fromService:
          name: publ-notification-admin
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_TELEMETRY_DISABLED
        value: 1

  - type: web
    name: publ-notification-admin
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build -w apps/admin-noti-v2
    startCommand: npm run start -w apps/admin-noti-v2 -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: publ-notification-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_TELEMETRY_DISABLED
        value: 1

  - type: worker
    name: publ-notification-background
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run prisma:generate && npm run build -w @publ/shared && npm run build -w @publ/database && npm run build -w @publ/worker && npm run build -w @publ/poller
    startCommand: npm run start:background
    envVars:
      - fromGroup: publ-shared-config
      - fromGroup: publ-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: publ-postgres
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: publ-redis
          property: connectionString

databases:
  - name: publ-postgres
    databaseName: publ_messaging
    user: publ_messaging
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []

  - name: publ-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
